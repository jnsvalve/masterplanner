# ─────────────────────────────────────────────────────────────────────────────
# E-ink Dashboard – config.example.yaml
#
# Copy this file to config.yaml and fill in your own values.
# config.yaml is gitignored – never commit it (contains credentials).
# ─────────────────────────────────────────────────────────────────────────────

# REQUIRED: Your home location (used for weather and HSL routing)
location:
  latitude: 60.1699     # decimal degrees, e.g. 60.1699
  longitude: 24.9384    # decimal degrees, e.g. 24.9384
  name: "Helsinki"      # display name (not currently shown, but useful for reference)

# ── Weather ───────────────────────────────────────────────────────────────────
# Uses Open-Meteo (https://open-meteo.com) – no API key required.
# location.latitude / location.longitude above are used automatically.

# ── Electricity (optional) ───────────────────────────────────────────────────
# Caruna customers only. Uses pycaruna to fetch yesterday's consumption.
# Leave this section out entirely to disable the electricity panel.
caruna:
  username: "your@email.com"
  password: "your-password"

# ── Calendars (optional) ─────────────────────────────────────────────────────
# iCal links – no OAuth needed.
# Google Calendar: Settings → (your calendar) → "Secret address in iCal format"
# Do not share config.yaml – the URL contains a secret token!
# max_events controls how many upcoming events are stored in cache for rendering.
calendar:
  max_events: 24

calendars:
  - name: "Personal"
    ical_url: "https://calendar.google.com/calendar/ical/YOUR_CALENDAR_ID/private-TOKEN/basic.ics"
  # - name: "Family"
  #   ical_url: "https://calendar.google.com/calendar/ical/FAMILY_ID/private-TOKEN/basic.ics"

# ── Waste collection schedule (optional) ─────────────────────────────────────
# Manual schedule – check your building's or municipality's collection calendar.
# next_date: the next known collection date (used as anchor for recurrence)
# interval_weeks: how often (1 = weekly, 2 = every two weeks, etc.)
waste:
  collections:
    - type: "Residual waste"
      interval_weeks: 2
      next_date: "2026-04-01"   # replace with your next collection date
    - type: "Bio waste"
      interval_weeks: 1
      next_date: "2026-04-01"
    - type: "Paper"
      interval_weeks: 4
      next_date: "2026-04-01"
    # - type: "Cardboard"
    #   interval_weeks: 4
    #   next_date: "2026-04-01"

# ── Daycare / eVaka (optional) ────────────────────────────────────────────────
# Espoo eVaka service. Leave out to disable the daycare panel.
# Other municipalities may use different eVaka URLs – set base_url accordingly.
evaka:
  username: "your@email.com"
  password: "your-password"
  base_url: "https://espoonvarhaiskasvatus.fi"  # change for your municipality
  letter_sender: "Kengurut"   # substring match on sender name (for evaka_letter module)
  letter_count: 2             # how many recent group messages to summarise

# ── Claude API (required for wilma_letter) ───────────────────────────────────
# Used by the wilma_letter module to extract bullet points from weekly letters.
# Get an API key at https://console.anthropic.com/
# Alternatively, set the ANTHROPIC_API_KEY environment variable.
claude:
  api_key: "sk-ant-..."

# ── Wilma school calendar (optional) ─────────────────────────────────────────
# Wilma is used by Finnish schools (inschool.fi). Supplements or replaces the
# eVaka cell when the child moves to primary school.
# ical_url: find it in Wilma → Preferences → Calendar export → copy the .ics link
wilma:
  username: "firstname.lastname@school.fi"
  password: "your-password"
  base_url: "https://espoo.inschool.fi"   # change for your school's Wilma
  ical_url: "https://espoo.inschool.fi/!TOKEN/preferences/token?tag=schedule/export/students/ID/Wilma.ics"

# ── HSL transit (optional) ───────────────────────────────────────────────────
# Shows next departures from your home location to a destination.
# Requires a free API key from https://portal-api.digitransit.fi/
# location.latitude / location.longitude above are used as the origin.
hsl:
  api_key: "your-digitransit-api-key"
  to_name: "Destination"   # display name for the destination
  to_lat: 60.1985           # destination latitude
  to_lon: 24.9323           # destination longitude
  num_results: 5            # how many connections to fetch
  min_walk_bus: 3           # minimum minutes to walk to a bus/tram stop
  min_walk_rail: 15         # minimum minutes to walk to a train/metro station

# ── Layout ───────────────────────────────────────────────────────────────────
# Assign any data module to rows. Each row can have either:
# - 3 modules (classic 3-column row), or
# - 1 module (full-width row)
# Available modules: weather, calendar, electricity, waste, hsl, evaka, wilma,
#                    wilma_letter, evaka_letter, keep,
#                    calendar_full_upcoming, calendar_full_week
# Use ~ (null) to leave a cell blank.
# The news strip is always rendered full-width at the bottom and is not configurable.
#
# Simple single-layout:
layout:
  grid:
    - [evaka, calendar, weather]      # Row 1: left, center, right
    - [electricity, hsl, waste]       # Row 2: left, center, right

# Named profiles — switch with: python main.py --layout <name>
# Uncomment and populate to use:
#  active: weekday               # default profile (used when --layout is omitted)
#  profiles:
#    weekday:
#      grid:
#        - [wilma_letter, calendar, weather]
#        - [wilma,        evaka_letter, hsl]
#    weekend:
#      grid:
#        - [evaka_letter, calendar, weather]
#        - [evaka,        ~,        hsl    ]
#    calendar_upcoming:
#      grid:
#        - [calendar_full_upcoming]
#    calendar_week:
#      grid:
#        - [calendar_full_week]

# ── Display ───────────────────────────────────────────────────────────────────
display:
  width: 800
  height: 480
  rotation: 0    # 0 or 180

# ── Partial updates ──────────────────────────────────────────────────────────
# Cells listed here as `true` get partial-refreshed every minute by
# `main.py --partial-only` (no API calls — reads cache only). Uses the
# `betterepd7in5` partial path on the Pi. Cells set to `false` (or omitted)
# only refresh during the 10-min fast / hourly full refresh.
# Available cells: clock, hsl. (Add more to render.py:PARTIAL_CELLS first.)
# A missing or empty `partial_updates` makes --partial-only a no-op.
partial_updates:
  clock: true
  hsl: true

# ── Cache TTLs ────────────────────────────────────────────────────────────────
# main.py is run by cron every 10 minutes.
# Each module refreshes only when its TTL has expired.
cache:
  ttl_minutes: 55               # weather, calendar (just under 1 hour)
  hsl_ttl_minutes: 10           # transit: refresh every cron run
  hsl_active_hours: [6, 22]     # HSL API only called between these hours
  evaka_ttl_minutes: 1440       # daycare: once per day
  electricity_ttl_minutes: 720  # electricity: twice per day
  wilma_letter_ttl_minutes: 240 # weekly letter: 4 hours
  evaka_letter_ttl_minutes: 240 # daycare group messages: 4 hours

# ── News ──────────────────────────────────────────────────────────────────────
# Reads any RSS feed. Defaults to YLE major headlines (no credentials needed).
# Other YLE feeds:
#   https://feeds.yle.fi/uutiset/v1/recent.rss?publisherIds=YLE_UUTISET  (latest)
#   https://feeds.yle.fi/uutiset/v1/recent.rss?publisherIds=YLE_URHEILU  (sports)
news:
  url: "https://feeds.yle.fi/uutiset/v1/majorHeadlines/YLE_UUTISET.rss"
  num_items: 3       # 1–5
  label: "UUTISET"  # section header shown on the dashboard
  ttl_minutes: 30
